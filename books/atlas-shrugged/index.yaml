description: |
  Román, v němž průmyslníci, vynálezci a myslitelé jeden po druhém mizí ze světa — až se ukáže, že jde o organizovanou stávku tvůrců proti systému, který je vykořisťuje. Rand buduje fikci jako filozofický argument: produkce, rozum a individuální zájem jako morální základy svobodné společnosti, parazitismus státu a kolektivismu jako jejich negace.
