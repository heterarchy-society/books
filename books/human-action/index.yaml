year: "1949"
description: |
  Monumentální obhajoba ekonomie volného trhu a praxeologie — vědy o lidském jednání. Mises buduje celou ekonomickou teorii od základu: z axiomů záměrného jednání odvozuje ceny, kapitál, cyklus, roli podnikatele i nevyhnutelný selhání centrálního plánování. Jedno z nejvlivnějších děl libertariánského a rakouského myšlení 20. století.
